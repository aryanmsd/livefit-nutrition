<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password | LiveFit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Optional: simple styling -->
  <style>
    body {
      background: #0d0221;
      color: #05d9e8;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .reset-box {
      background: rgba(0, 0, 0, 0.8);
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 20px #05d9e8;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #05d9e8;
      background: transparent;
      color: #05d9e8;
      border-radius: 5px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #05d9e8;
      border: none;
      color: #0d0221;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #00bcd4;
    }

    .message {
      margin-top: 15px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <div class="reset-box">
    <h2>Reset Password</h2>

    <input
      type="password"
      id="newPassword"
      placeholder="Enter new password"
      required
    />

    <button onclick="resetPassword()">Reset Password</button>

    <div id="message" class="message"></div>
  </div>

  <script>
    async function resetPassword() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const password = document.getElementById("newPassword").value;
      const messageEl = document.getElementById("message");

      if (!token) {
        messageEl.textContent = "❌ Invalid or missing reset token.";
        return;
      }

      if (!password || password.length < 6) {
        messageEl.textContent = "⚠️ Password must be at least 6 characters.";
        return;
      }

      try {
        const res = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (data.error) {
          messageEl.textContent = "❌ " + data.error;
        } else {
          messageEl.textContent = "✅ Password reset successful! You can now log in.";
        }
      } catch (err) {
        messageEl.textContent = "❌ Something went wrong. Try again.";
      }
    }
  </script>

</body>
</html>
