<!DOCTYPE html>
<html>
<head>
  <title>LiveFit Meals</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="meals-section">

  <h1 class="page-title">Healthy Meals</h1>

  <!-- FILTER -->
  <div class="filter-bar">
    <button class="filter-btn active" data-type="all">All</button>
    <button class="filter-btn" data-type="veg">Veg</button>
    <button class="filter-btn" data-type="non-veg">Non Veg</button>
  </div>

  <!-- MEALS GRID -->
  <div id="mealsContainer" class="meals-grid"></div>

  <!-- Link to cart page instead of embedding cart here -->
  <div style="text-align:center; margin-top: 32px;">
    <a href="cart.html" style="
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 14px 32px;
      background: #00e5ff;
      color: #000;
      border-radius: 12px;
      text-decoration: none;
      letter-spacing: 0.5px;
    ">🛒 View Cart &amp; Checkout →</a>
  </div>

</section>

<script src="meals.js"></script>
</body>
</html>
